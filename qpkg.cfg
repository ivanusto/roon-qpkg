# RoonServer QPKG configuration
# Built with QDK (qbuild). See https://github.com/qnap-dev/QDK

# Name of the packaged application.
# NOTE: intentionally NOT "RoonServer" — QNAP's store carries an app with
# that internal name, and a name collision makes App Center treat this
# package as the same app and force-"update" over it.
QPKG_NAME="RoonServerDocker"
# Name of the display application.
QPKG_DISPLAY_NAME="Roon Server (Docker)"
# Version of the packaged application.
QPKG_VER="1.1.0"
# Author or maintainer of the package.
QPKG_AUTHOR="roon-qpkg contributors"
# License for the packaged application.
QPKG_LICENSE="MIT"
# One-line description of the packaged application.
QPKG_SUMMARY="Roon Server via the official RoonLabs Docker image (ghcr.io/roonlabs/roonserver). Thin QPKG shell: management scripts + status UI only; the container is created by Container Station in the background."

# Preferred number in start/stop sequence.
QPKG_RC_NUM="199"
# Init-script used to control the daemon.
# Distinct name so it can never collide with the store "RoonServer"
# package's init script in /etc/init.d/.
QPKG_SERVICE_PROGRAM="roon-server-docker.sh"

# Package dependencies. Container Station provides the docker CLI.
QPKG_REQUIRE="container-station >= 3.0"

# Minimum QTS version.
QTS_MINI_VERSION="5.0.0"

# Location of the web interface. The status page is served by a tiny
# busybox httpd container managed by this package — it does NOT depend
# on the optional QTS "Web Server" service being enabled.
QPKG_WEBUI="/"
# Port of the status-page container (ROON_UI_PORT in roon.conf).
QPKG_WEB_PORT="18630"

# Location of icons for the packaged application.
QDK_DATA_DIR_ICONS="icons"
# Location of files specific to x86_64 packages.
QDK_DATA_DIR_X86_64="x86_64"
# Location of files common to all architectures.
QDK_DATA_DIR_SHARED="shared"
